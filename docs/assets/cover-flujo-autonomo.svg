<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="Flujo Autónomo · Orquestador local de procesos">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.07" stroke="#94a3b8" stroke-width="1">
    <path d="M0 60 H1280 M0 120 H1280 M0 180 H1280 M0 240 H1280 M0 300 H1280"/>
    <path d="M120 0 V360 M240 0 V360 M360 0 V360 M480 0 V360 M600 0 V360 M720 0 V360 M840 0 V360 M960 0 V360 M1080 0 V360 M1200 0 V360"/>
  </g>

  <!-- Accent stripe -->
  <rect x="60" y="50" width="6" height="260" rx="3" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Title -->
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <text x="90" y="115" fill="#e2e8f0" font-size="56" font-weight="700">Flujo Autónomo</text>
    <text x="90" y="155" fill="#94a3b8" font-size="22" font-weight="500">Orquestador local de procesos para PC</text>
    <text x="90" y="200" fill="#cbd5e1" font-size="17">Flows declarativos · Sandbox por flow · Scheduler con cron · OCR &amp; visión</text>
    <text x="90" y="225" fill="#cbd5e1" font-size="17">Panel 3-tabs · Métricas Prometheus · Webhooks · Local-first</text>
  </g>

  <!-- Three tab cards -->
  <g transform="translate(800,70)">
    <!-- Tab 1: Run -->
    <g>
      <rect x="0" y="0" width="140" height="220" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1"/>
      <circle cx="20" cy="22" r="6" fill="#3b82f6"/>
      <text x="36" y="28" fill="#e2e8f0" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" font-weight="600">Ejecutar</text>
      <rect x="14" y="48" width="112" height="10" rx="3" fill="#334155"/>
      <rect x="14" y="68" width="80" height="8" rx="3" fill="#475569"/>
      <rect x="14" y="100" width="112" height="42" rx="10" fill="#1d4ed8"/>
      <text x="70" y="126" fill="white" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600">▶ Ejecutar</text>
      <rect x="14" y="158" width="60" height="8" rx="3" fill="#334155"/>
      <rect x="14" y="174" width="90" height="8" rx="3" fill="#334155"/>
    </g>

    <!-- Tab 2: Schedule -->
    <g transform="translate(160,0)">
      <rect x="0" y="0" width="140" height="220" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1"/>
      <circle cx="20" cy="22" r="6" fill="#f59e0b"/>
      <text x="36" y="28" fill="#e2e8f0" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" font-weight="600">Programadas</text>
      <rect x="14" y="48" width="112" height="10" rx="3" fill="#334155"/>
      <text x="14" y="80" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="11">*/15 * * * *</text>
      <rect x="14" y="92" width="112" height="6" rx="3" fill="#334155"/>
      <rect x="14" y="104" width="92" height="6" rx="3" fill="#334155"/>
      <rect x="14" y="124" width="112" height="32" rx="8" fill="#92400e"/>
      <text x="70" y="145" fill="#fef3c7" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500">⏰ Activo</text>
      <rect x="14" y="172" width="80" height="8" rx="3" fill="#334155"/>
    </g>

    <!-- Tab 3: History -->
    <g transform="translate(320,0)">
      <rect x="0" y="0" width="140" height="220" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1"/>
      <circle cx="20" cy="22" r="6" fill="#10b981"/>
      <text x="36" y="28" fill="#e2e8f0" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" font-weight="600">Histórico</text>
      <g font-family="ui-monospace, monospace" font-size="9" fill="#cbd5e1">
        <rect x="14" y="48" width="112" height="22" rx="4" fill="#0f172a" stroke="#1e293b"/>
        <circle cx="22" cy="59" r="3" fill="#10b981"/>
        <text x="30" y="63" fill="#cbd5e1">run-001 · 0.21s</text>
        <rect x="14" y="76" width="112" height="22" rx="4" fill="#0f172a" stroke="#1e293b"/>
        <circle cx="22" cy="87" r="3" fill="#10b981"/>
        <text x="30" y="91" fill="#cbd5e1">run-002 · 0.18s</text>
        <rect x="14" y="104" width="112" height="22" rx="4" fill="#0f172a" stroke="#1e293b"/>
        <circle cx="22" cy="115" r="3" fill="#ef4444"/>
        <text x="30" y="119" fill="#cbd5e1">run-003 · 0.45s</text>
        <rect x="14" y="132" width="112" height="22" rx="4" fill="#0f172a" stroke="#1e293b"/>
        <circle cx="22" cy="143" r="3" fill="#10b981"/>
        <text x="30" y="147" fill="#cbd5e1">run-004 · 0.31s</text>
        <rect x="14" y="160" width="112" height="22" rx="4" fill="#0f172a" stroke="#1e293b"/>
        <circle cx="22" cy="171" r="3" fill="#10b981"/>
        <text x="30" y="175" fill="#cbd5e1">run-005 · 0.22s</text>
      </g>
    </g>
  </g>

  <!-- Footer chip -->
  <g transform="translate(90,260)">
    <rect x="0" y="0" width="180" height="32" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="90" y="21" fill="#cbd5e1" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600">🐍 Python 3.10+</text>
  </g>
  <g transform="translate(280,260)">
    <rect x="0" y="0" width="200" height="32" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="100" y="21" fill="#cbd5e1" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600">📦 SQLite · uv-ready</text>
  </g>
  <g transform="translate(490,260)">
    <rect x="0" y="0" width="200" height="32" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="100" y="21" fill="#cbd5e1" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600">🛡️ Sandbox por flow</text>
  </g>
</svg>
