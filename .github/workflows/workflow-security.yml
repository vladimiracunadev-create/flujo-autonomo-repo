name: Workflow security

# Audita los propios archivos .github/workflows/*.yml en busca de:
#  - script injection vía expresiones ${{ github.event.* }} en run:
#  - uso de pull_request_target sin sanitizar (riesgo crítico)
#  - acciones third-party sin pin a SHA
#  - permisos excesivos del GITHUB_TOKEN
#  - uso de tags movibles (@main, @master, @v1) en third-party
#
# Herramientas:
#   - actionlint: linter sintáctico + reglas de seguridad básicas
#   - zizmor:     analizador estático especializado en GitHub Actions
#                 (https://github.com/woodruffw/zizmor)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
  schedule:
    - cron: '0 5 * * 1'  # lunes 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-sec-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint (sintaxis + reglas seguridad)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Descargar actionlint (con verificación de checksum)
        run: |
          VERSION="1.7.7"
          BIN="actionlint_${VERSION}_linux_amd64.tar.gz"
          curl -sSfL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/${BIN}"
          # Checksum publicado en el release
          EXPECTED="023070a287cd8cccd71515fd2ecb7eb9b5ee2f7fed6f6e0fa4104b52d4e60d10"
          ACTUAL=$(sha256sum actionlint.tar.gz | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::warning::Checksum de actionlint no coincide ($ACTUAL). Verificar release manualmente."
            # No falla automáticamente — el checksum cambia con cada versión nueva.
            # Mantener actualizado al subir VERSION.
          fi
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint
      - name: Ejecutar actionlint
        run: ./actionlint -color

  zizmor:
    name: zizmor (análisis estático de workflows)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.4.0
        with:
          python-version: '3.12'
      - name: Instalar zizmor (pinned)
        run: pip install 'zizmor==1.5.2'
      - name: Auditar workflows
        run: |
          # zizmor detecta:
          #  - template injection (${{ github.event.X }} en run:)
          #  - excessive-permissions
          #  - dangerous-triggers (pull_request_target, workflow_run)
          #  - unpinned-uses (tags en lugar de SHA)
          #  - artipacked / cache-poisoning
          # Modo persona "auditor" para reportes detallados.
          zizmor --persona=auditor --format=plain .github/workflows/

  pin-check:
    name: Verificar pin a SHA en acciones third-party
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Detectar uses sin SHA (excepto allowlist)
        run: |
          # Allowlist: acciones de confianza con tag movible aceptado temporalmente.
          # Mantener al mínimo. Cualquier acción aquí debe estar justificada en SECURITY.md.
          ALLOWLIST=(
            "astral-sh/setup-uv"   # vendor first-party de uv; ver SECURITY.md §CI
          )

          violations=0
          while IFS= read -r line; do
            file="${line%%:*}"
            content="${line#*:}"
            # Extrae "owner/repo@ref"
            ref=$(echo "$content" | grep -oP 'uses:\s*\K[^\s]+' || true)
            [ -z "$ref" ] && continue
            # Acciones locales (./...) o reusable workflows (.github/workflows/...) no aplican
            case "$ref" in
              ./*|.github/*) continue ;;
            esac
            action="${ref%@*}"
            version="${ref#*@}"
            # SHA = 40 chars hex
            if [[ "$version" =~ ^[0-9a-f]{40}$ ]]; then
              continue
            fi
            # Allowlist
            allowed=0
            for a in "${ALLOWLIST[@]}"; do
              if [ "$action" = "$a" ]; then allowed=1; break; fi
            done
            if [ "$allowed" -eq 1 ]; then
              echo "::notice file=$file::$action@$version (allowlisted)"
              continue
            fi
            echo "::error file=$file::Acción third-party sin SHA pin: $action@$version"
            violations=$((violations+1))
          done < <(grep -rn 'uses:' .github/workflows/ || true)

          if [ "$violations" -gt 0 ]; then
            echo ""
            echo "❌ $violations acción(es) sin SHA. Pinear así:"
            echo "   uses: owner/repo@<sha-de-40-chars>  # vX.Y.Z"
            echo "Ver SECURITY.md §CI para la política."
            exit 1
          fi
          echo "✅ Todas las acciones third-party están pinned a SHA o en allowlist"
