name: Dependency hygiene

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # lunes 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  outdated:
    name: Detectar dependencias desactualizadas
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra schema
      - name: pip list --outdated
        run: uv run pip list --outdated --format json | tee /tmp/outdated.json
      - name: Resumen
        run: |
          python - <<'PY'
          import json, pathlib
          data = json.loads(pathlib.Path('/tmp/outdated.json').read_text())
          if not data:
              print("✅ Todas las dependencias al día")
          else:
              print(f"📦 {len(data)} paquete(s) con versión nueva disponible:")
              for pkg in data:
                  print(f"  - {pkg['name']}  {pkg['version']} → {pkg['latest_version']}")
          PY
        continue-on-error: true
