name: Security

# Modelo de amenaza: este repo ejecuta acciones de teclado/mouse/captura de
# pantalla en el equipo del operador. Un commit malicioso fusionado a main
# se traduce directamente en RCE local cuando el operador hace pull. Por eso:
#  - Todas las acciones third-party van pinned a SHA (no a tag).
#  - persist-credentials: false en todos los checkout.
#  - Permisos mínimos por job.
#  - Detección de Trojan Source, ofuscación, secretos y vulns conocidas.
#  - Análisis estático con CodeQL security-extended.
#  - Los workflows mismos se auditan en .github/workflows/workflow-security.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # lunes 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. CodeQL con queries extendidas ──────────────────────────────────────
  codeql:
    name: CodeQL Python (security-extended)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3.28.10
        with:
          languages: python
          # Queries extendidas: detectan command injection, path traversal,
          # uso inseguro de subprocess/eval, deserialización, etc.
          queries: security-extended,security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3.28.10
        with:
          category: "/language:python"

  # ── 2. detect-secrets con baseline obligatorio + scan de historial ────────
  detect-secrets:
    name: detect-secrets (tracked + history)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0  # necesario para escaneo de historial
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.4.0
        with:
          python-version: '3.12'
      - name: Install detect-secrets (versión pinned)
        run: pip install detect-secrets==1.5.0
      - name: Validar baseline si existe
        run: |
          if [ -f .secrets.baseline ]; then
            python -m json.tool .secrets.baseline > /dev/null
            echo "✅ Baseline válido"
          else
            echo "ℹ️  Sin baseline — se hará escaneo limpio"
          fi
      - name: Escaneo del filesystem actual
        run: |
          detect-secrets scan \
            --exclude-files '\.git/|\.venv/|node_modules/|\.tmp.*|output/|state/|logs/|db/|docs/manual_screenshots/|\.secrets\.baseline' \
            --exclude-lines '^\s*#|^\s*//|^\s*\*' \
            > /tmp/scan_output.json
          python - <<'PY'
          import json, sys
          data = json.load(open('/tmp/scan_output.json'))
          results = data.get('results', {})
          if results:
              print('⚠️ Posibles secretos detectados:')
              for fpath, items in results.items():
                  for it in items:
                      print(f"  {fpath}:{it.get('line_number')}  type={it.get('type')}")
              sys.exit(1)
          print('✅ Sin secretos expuestos en filesystem')
          PY
      - name: Escaneo de últimos 50 commits
        run: |
          # Falla si algún commit reciente introdujo secretos (incluso si fueron borrados después).
          # Estrategia: para cada commit, escaneamos el árbol completo en ese punto.
          # Esto detecta tanto blobs aún presentes como blobs eliminados después.
          set -e
          status=0
          for sha in $(git log --format="%H" -n 50); do
            tmp=$(mktemp -d)
            git --work-tree="$tmp" checkout "$sha" -- . 2>/dev/null || { rm -rf "$tmp"; continue; }
            (
              cd "$tmp"
              detect-secrets scan \
                --exclude-files '\.git/|\.venv/|node_modules/|output/|state/|logs/|db/|\.secrets\.baseline|\.lock$' \
                > /tmp/hist_scan.json 2>/dev/null || true
            )
            rm -rf "$tmp"
            if python -c 'import json,sys; d=json.load(open("/tmp/hist_scan.json")); sys.exit(1 if d.get("results") else 0)'; then
              :
            else
              echo "::error::Secreto detectado en commit $sha"
              status=1
            fi
          done
          if [ "$status" -ne 0 ]; then exit 1; fi
          echo "✅ Historial reciente limpio"

  # ── 3. Trojan Source + patrones de ofuscación ─────────────────────────────
  supply-chain:
    name: Supply chain (Trojan Source + obfuscation)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      # CVE-2021-42574: caracteres bidi Unicode pueden ocultar lógica maliciosa
      # haciendo que el código se vea diferente al humano vs. al compilador.
      - name: Detectar caracteres Unicode bidireccionales
        run: |
          if git ls-files -z | xargs -0 grep -PlU $'\x{202a}|\x{202b}|\x{202c}|\x{202d}|\x{202e}|\x{2066}|\x{2067}|\x{2068}|\x{2069}|\x{200f}|\x{061c}' 2>/dev/null; then
            echo "::error::Caracteres bidireccionales detectados (Trojan Source — CVE-2021-42574)"
            exit 1
          fi
          echo "✅ Sin Trojan Source"
      - name: Detectar zero-width / homoglyphs sospechosos en código
        run: |
          # Zero-width space, joiner, non-joiner — usados para esconder identificadores
          if git ls-files -z '*.py' '*.js' '*.ts' '*.yml' '*.yaml' \
             | xargs -0 grep -PlU $'\x{200B}|\x{200C}|\x{200D}|\x{FEFF}' 2>/dev/null; then
            echo "::error::Caracteres zero-width detectados en código fuente"
            exit 1
          fi
          echo "✅ Sin zero-width sospechosos"
      - name: Detectar patrones de ofuscación / ejecución dinámica
        run: |
          status=0
          # .github/ y tests legítimos contienen estos patrones como reglas — excluirlos
          EXCLUDE='\.github/|tests/.*detect.*|docs/'
          # base64 + exec/eval combinados (típico dropper)
          if git ls-files -z | grep -zEv "$EXCLUDE" \
             | xargs -0 grep -Pl 'exec\s*\(\s*(base64|codecs\.decode)' 2>/dev/null; then
            echo "::error::Patrón base64+exec detectado"
            status=1
          fi
          # eval con argumento no-literal (no es una constante string)
          if git ls-files -z '*.py' | grep -zEv "$EXCLUDE" \
             | xargs -0 grep -Pl 'eval\s*\([^"\x27]' 2>/dev/null; then
            echo "::warning::eval() con argumento dinámico — revisar"
            status=1
          fi
          # os.system con concatenación de strings (command injection clásico)
          if git ls-files -z '*.py' | grep -zEv "$EXCLUDE" \
             | xargs -0 grep -Pl 'os\.system\s*\(.*\+' 2>/dev/null; then
            echo "::error::os.system con concatenación detectado"
            status=1
          fi
          # subprocess con shell=True + string formattado
          if git ls-files -z '*.py' | grep -zEv "$EXCLUDE" \
             | xargs -0 grep -Pl 'subprocess\.[a-z_]+\([^)]*shell\s*=\s*True[^)]*(\+|f["\x27]|\.format\()' 2>/dev/null; then
            echo "::warning::subprocess shell=True con interpolación — revisar"
            status=1
          fi
          # pickle.loads sobre datos no controlados (RCE)
          if git ls-files -z '*.py' | grep -zEv "$EXCLUDE|tests/" \
             | xargs -0 grep -Pl 'pickle\.loads?\(' 2>/dev/null; then
            echo "::warning::pickle.loads detectado — verificar origen del dato"
            status=1
          fi
          # __import__ dinámico
          if git ls-files -z '*.py' | grep -zEv "$EXCLUDE" \
             | xargs -0 grep -Pl '__import__\s*\([^"\x27]' 2>/dev/null; then
            echo "::warning::__import__ dinámico detectado"
            status=1
          fi
          if [[ "$status" -ne 0 ]]; then exit "$status"; fi
          echo "✅ Sin patrones de ofuscación"
      - name: Detectar URLs de webhook/exfiltración hardcodeadas
        run: |
          # URLs de servicios típicamente usados para C2 / exfil
          # (excluyendo .github/ y configs legítimas)
          if git ls-files -z | grep -zEv '\.github/|docs/|tests/' \
             | xargs -0 grep -PlE '(discord\.com/api/webhooks|hooks\.slack\.com|webhook\.site|requestbin\.com|burpcollaborator\.net|ngrok\.io|pastebin\.com/raw)' 2>/dev/null; then
            echo "::error::URL de webhook/exfil sospechosa hardcodeada"
            exit 1
          fi
          echo "✅ Sin URLs de exfil sospechosas"

  # ── 4. pip-audit con enforcement progresivo ───────────────────────────────
  pip-audit:
    name: pip-audit (deps vulnerables)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # En PR avisamos sin bloquear; en push a main / schedule fallamos.
      ENFORCEMENT: ${{ github.event_name == 'pull_request' && 'soft' || 'hard' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra schema
      - name: Install pip-audit (pinned)
        run: uv pip install 'pip-audit==2.7.3'
      - name: Run pip-audit
        run: |
          set +e
          uv run pip-audit --strict --desc
          rc=$?
          if [ "$rc" -ne 0 ] && [ "$ENFORCEMENT" = "hard" ]; then
            echo "::error::Vulnerabilidades en deps (modo hard, push/schedule)"
            exit "$rc"
          fi
          if [ "$rc" -ne 0 ]; then
            echo "::warning::Vulnerabilidades en deps (modo soft en PR — revisar antes de merge)"
          fi
