name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install project (runtime + dev + schema)
        run: uv sync --extra dev --extra schema
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Validate manifests
        run: uv run python scripts/validate_project.py
      - name: Run tests
        run: uv run pytest --cov=engine --cov=actions --cov=app --cov-report=term-missing

  smoke:
    name: Smoke (integration)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra schema
      - name: Smoke test
        run: uv run python scripts/smoke_test.py
