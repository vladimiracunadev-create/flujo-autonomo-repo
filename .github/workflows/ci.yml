name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Mínimo privilegio a nivel workflow. Cada job sube solo lo que necesite.
permissions:
  contents: read

# Cancela ejecuciones obsoletas del mismo branch/PR (defensa contra abuso de cómputo
# y reduce ventana de ataque si una corrida queda colgada con tokens vivos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      # SHA pin (v4.2.2) — evita riesgo de tag movible (incidente tj-actions/changed-files mar-2025).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false  # no expone GITHUB_TOKEN a steps posteriores
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install project (runtime + dev + schema)
        run: uv sync --extra dev --extra schema
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Validate manifests
        run: uv run python scripts/validate_project.py
      - name: Run tests
        run: uv run pytest

  smoke:
    name: Smoke (integration)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra schema
      - name: Smoke test
        run: uv run python scripts/smoke_test.py
