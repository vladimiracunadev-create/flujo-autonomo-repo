name: Markdown docs

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: md-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Validar links internos
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.4.0
        with:
          python-version: '3.12'
      - name: Verificar referencias internas
        run: |
          python - <<'PY'
          import re, pathlib, sys
          root = pathlib.Path('.')
          missing = []
          link_re = re.compile(r'\[([^\]]+)\]\(([^)]+)\)')
          for md in root.rglob('*.md'):
              if any(part in str(md) for part in ('node_modules', '.git', 'output', 'state', 'logs')):
                  continue
              text = md.read_text(encoding='utf-8', errors='ignore')
              for m in link_re.finditer(text):
                  href = m.group(2).split('#')[0].split(' ')[0]
                  if not href or href.startswith(('http://', 'https://', 'mailto:', '#')):
                      continue
                  target = (md.parent / href).resolve()
                  if not target.exists():
                      missing.append(f"{md}:{m.start()}  → {href}")
          if missing:
              print("⚠️ Links rotos:")
              for x in missing[:50]:
                  print(f"  {x}")
              sys.exit(1)
          print("✅ Todos los links internos resuelven")
          PY
